# Default permissions that apply to all repositories
default:
  permissions:
    # Format: permission_name: access_level
    # access_level can be: read, write, or none
    contents: write
    metadata: read
    issues: write
    pull_requests: write
    deployments: write
    # packages: read
    # actions: read
    # security_events: read
    # statuses: read
    # checks: read
    # discussions: read
    # pages: read
    # workflows: read

# Repository-specific permission overrides, merged over the defaults above.
# Format: owner/repo, or owner/* to cover a whole org.
#
#   "my-org/*":
#     permissions:
#       contents: read
#       issues: read
#   "my-org/specific-repo":
#     permissions:
#       organization_projects: write
#       deployments: none
repositories: {}
